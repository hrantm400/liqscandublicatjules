<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaykTrading — Signals Dashboard</title>
    <meta name="description" content="Live trading signals dashboard with RSI Divergence, SuperEngulfing, and ICT Bias indicators powered by Binance data.">
    <link rel="stylesheet" href="style.css">
    <!-- Lightweight Charts by TradingView -->
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<div class="app-container">
    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">📊</div>
                <span>HaykTrading</span>
            </div>
            <div class="divider"></div>
            <div class="symbol-info">
                <span class="symbol-name" id="current-symbol">BTCUSDT</span>
                <span class="symbol-interval" id="current-interval">1H</span>
            </div>
            <div class="divider"></div>
            <div class="price-display">
                <span id="current-price">$—</span>
                <span class="price-change" id="price-change">0.00%</span>
            </div>
        </div>
        <div class="header-right">
            <div class="connection-status">
                <span class="status-dot" id="connection-dot"></span>
                <span id="connection-text">Connecting…</span>
            </div>
        </div>
    </header>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="toolbar-section">
            <span class="toolbar-label">Symbol</span>
            <div class="symbol-input-wrap">
                <input type="text" id="symbol-input" value="BTCUSDT" placeholder="e.g. ETHUSDT">
                <button id="load-btn">Go</button>
            </div>
        </div>

        <div class="divider" style="margin: 0 4px;"></div>

        <div class="toolbar-section" id="quick-symbols">
            <!-- Populated by JS -->
        </div>

        <div class="divider" style="margin: 0 4px;"></div>

        <div class="toolbar-section" id="interval-buttons">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- CHART AREA -->
    <div class="chart-area">
        <div class="charts-toolbar" style="display: flex; gap: 8px; padding: 8px 16px; background: var(--bg-secondary); border-bottom: 1px solid var(--border);">
            <button id="add-chart-btn" class="interval-btn" style="background: var(--accent-blue); color: white; border-color: var(--accent-blue);">+ Add Chart</button>
            <button id="grid-view-btn" class="interval-btn active">Grid</button>
            <button id="single-view-btn" class="interval-btn">Single</button>
        </div>
        <div id="charts-container" class="grid-view">
            <!-- Dynamic chart wrappers will be injected here by app.js -->
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <!-- Stats -->
        <div class="sidebar-section">
            <div class="sidebar-title">Indicators</div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">RSI</div>
                    <div class="stat-value" id="rsi-value">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">ICT Bias</div>
                    <div class="stat-value" id="bias-value">—</div>
                </div>
                <div class="stat-card" style="grid-column: span 2;">
                    <div class="stat-label">Total Signals</div>
                    <div class="stat-value" id="signal-count">0</div>
                </div>
            </div>
        </div>

        <!-- Settings -->
        <div class="sidebar-section">
            <div class="sidebar-title">Signal Settings</div>
            <div class="settings-list">
                <div class="setting-item">
                    <span class="setting-label">🟢 Bull Divergence</span>
                    <label class="toggle">
                        <input type="checkbox" id="toggle-bull-div" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span class="setting-label">🔴 Bear Divergence</span>
                    <label class="toggle">
                        <input type="checkbox" id="toggle-bear-div" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span class="setting-label">🟢 Hidden Bull Div</span>
                    <label class="toggle">
                        <input type="checkbox" id="toggle-hidden-bull">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span class="setting-label">🔴 Hidden Bear Div</span>
                    <label class="toggle">
                        <input type="checkbox" id="toggle-hidden-bear">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span class="setting-label">⬆️ RUN Patterns</span>
                    <label class="toggle">
                        <input type="checkbox" id="toggle-run" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span class="setting-label">🔄 REV Patterns</span>
                    <label class="toggle">
                        <input type="checkbox" id="toggle-rev" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Signal List -->
        <div class="signal-list-header">
            <div class="sidebar-title" style="margin-bottom: 0;">Recent Signals</div>
            <span class="signal-count" id="signal-count-badge">0</span>
        </div>
        <div class="signal-list-container">
            <div id="signal-list">
                <div class="no-signals">Loading signals…</div>
            </div>
        </div>
    </aside>
</div>

<!-- Loading Overlay -->
<div id="loading-overlay">
    <div class="loader"></div>
</div>

<!-- Error Toast -->
<div id="error-toast"></div>

<!-- Scripts (order matters) -->
<script src="js/indicators.js"></script>
<script src="js/binance.js"></script>
<script src="js/chart.js"></script>
<script src="js/app.js"></script>

</body>
</html>
